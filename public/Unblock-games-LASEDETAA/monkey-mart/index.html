<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
  <title>Monkey Mart - Unblocked</title>
  <style>
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #120721;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <iframe 
      src="https://classroom-6x.github.io/monkey-mart/" 
      title="Monkey Mart" 
      allowfullscreen="true" 
      scrolling="no" 
      allow="autoplay; gamepad; keyboard"
      referrerpolicy="no-referrer">
    </iframe>
  </div>
</body>
</html>
